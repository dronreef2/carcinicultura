# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Configuração do Mosquitto — IoT Camarão                                   ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ─── Persistência ─────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logs ─────────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
connection_messages true

# ─── Listener MQTT padrão (porta 1883) ───────────────────────────────────────
listener 1883
protocol mqtt

# ─── Listener WebSocket (porta 9001) para dashboard ──────────────────────────
listener 9001
protocol websockets

# ─── Autenticação ─────────────────────────────────────────────────────────────
# Não permite conexões anônimas — requer usuário/senha
allow_anonymous false
password_file /mosquitto/config/password.txt
