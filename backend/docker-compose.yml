version: "3.8"

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Docker Compose — IoT Camarão Módulo 1                                     ║
# ║  Serviços: Mosquitto (MQTT), TimescaleDB (PostgreSQL), FastAPI (Backend)   ║
# ║  Configure as credenciais em .env (copie de .env.example)                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:

  # ─── Broker MQTT (Mosquitto) ────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: camarao-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT padrão
      - "9001:9001"   # WebSocket (para dashboard)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/password.txt:/mosquitto/config/password.txt:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - camarao-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # ─── Banco de Dados TimescaleDB ────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: camarao-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-camarao_iot}
      POSTGRES_USER: ${POSTGRES_USER:-camarao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-camarao_db_senha_segura}
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    networks:
      - camarao-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-camarao} -d ${POSTGRES_DB:-camarao_iot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camarao-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-camarao}:${POSTGRES_PASSWORD:-camarao_db_senha_segura}@timescaledb:5432/${POSTGRES_DB:-camarao_iot}"
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USER: ${MQTT_USER:-camarao}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-mqtt_senha_segura}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - camarao-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  mosquitto_data:
  mosquitto_log:
  timescale_data:

networks:
  camarao-net:
    driver: bridge
